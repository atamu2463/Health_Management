services:
  db:
    container_name: db
    image: postgres:16 
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myappdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend: Spring Boot (Java LTS = 21)
  backend:
    container_name: backend
    build: 
      context: ./backend
    volumes:
      - ./backend:/app
    working_dir: /app
    ports:
      - "8080:8080"
    tty: true
    depends_on:
      - db

  # Frontend: React (Node.js v20.19.5)
  frontend:
    container_name: frontend
    build: 
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    ports:
      - "5173:5173" #Viteを使用
    tty: true
    stdin_open: true
    depends_on:
      - backend

# データをDocker内部領域で管理するためのボリューム定義
volumes:
  postgres_data: